name: Release Windows Build

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set Up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build
        run: mvn clean package

      - name: Build App Image
        shell: pwsh
        run: |
          jpackage `
          --name AchievementScanner `
          --input target/dist `
          --main-jar AchievementScanner.jar `
          --main-class pyguy.Main `
          --type app-image `
          --dest build

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: "AchievementScanner-windows"
          path: build/AchievementScanner/**