name: Release Windows Build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  
jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set Up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build
        run: mvn clean package

      - name: Build App Image
        shell: pwsh
        run: |
          jpackage `
          --name AchievementScanner `
          --input target\dist `
          --main-jar AchievementScanner.jar `
          --main-class pyguy.Main `
          --type app-image `
          --dest build

      - name: Fix Tessdata Location # Yes, it's jank I know
        shell: pwsh
        run: Move-Item build\AchievementScanner\app\tessdata build\AchievementScanner\tessdata

      - name: Zip Build
        shell: pwsh
        run: Compress-Archive -Path build/AchievementScanner/* -DestinationPath build/AchievementScanner-windows.zip

      - name: Upload to GitHub Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: build/AchievementScanner-windows.zip
          tag: ${{ github.ref_name }}
          overwrite: true